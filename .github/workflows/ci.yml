name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pylint black isort pytest pytest-asyncio
    
    - name: Lint with flake8
      run: |
        flake8 lib/kimi_enterprise --max-line-length=100 --count --show-source --statistics || true
    
    - name: Check formatting with black
      run: |
        black --check lib/kimi_enterprise || true
    
    - name: Run unit tests
      run: |
        pytest tests/unit/ -v || true
    
    - name: Run integration tests
      run: |
        pytest tests/integration/ -v || true

  shellcheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Shellcheck
      run: |
        if command -v shellcheck &> /dev/null; then
          shellcheck install.sh bin/kimi-enterprise-cli || true
        else
          echo "shellcheck not installed, skipping"
        fi
